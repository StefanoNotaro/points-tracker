# Single-entry reverse proxy for the deployment compose.
# Routes / to the static SPA bundle and /api, /hubs to the API container.
# The web container's own nginx already serves the bundle; this proxy
# just stitches both upstreams behind one port.

upstream points_tracker_web { server web:8080; }
upstream points_tracker_api { server api:8080; }

server {
    listen      8080;
    server_name _;

    # Sane defaults
    client_max_body_size 1m;
    proxy_http_version   1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API
    location /api/ {
        proxy_pass         http://points_tracker_api;
        proxy_read_timeout 30s;
    }

    # SignalR (WebSocket upgrade)
    location /hubs/ {
        proxy_pass         http://points_tracker_api;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # SPA static bundle — the web container already does try_files →
    # index.html for client-side routing, so we just forward everything
    # else through to it.
    location / {
        proxy_pass http://points_tracker_web;
    }
}

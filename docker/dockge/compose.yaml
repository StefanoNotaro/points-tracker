name: points-tracker

networks:
  pts-net:
    driver: bridge

services:

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /mnt/HDDs/Applications/github/points-tracker/db:/var/lib/postgresql/data
    configs:
      - source: postgres_init_sql
        target: /docker-entrypoint-initdb.d/init.sql
        mode: 0444
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pts-net

  api:
    image: ghcr.io/stefanonotaro/points-tracker-api:${IMAGE_TAG}
    pull_policy: always
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      Authentik__Authority: ${AUTHENTIK_AUTHORITY}
      Authentik__ClientId: ${AUTHENTIK_CLIENT_ID}
      ShareToken__Secret: ${SHARE_TOKEN_SECRET}
      Cors__AllowedOrigins__0: ${APP_BASE_URL}
      Frontend__BaseUrl: ${APP_BASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pts-net

  web:
    image: ghcr.io/stefanonotaro/points-tracker-web:${IMAGE_TAG}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - pts-net

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    configs:
      - source: nginx_proxy_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0444
    ports:
      - "${PROXY_PORT}:8080"
    depends_on:
      - web
      - api
    networks:
      - pts-net

configs:

  nginx_proxy_conf:
    content: |
      upstream points_tracker_web { server web:8080; }
      upstream points_tracker_api { server api:8080; }

      server {
          listen      8080;
          server_name _;

          client_max_body_size 1m;
          proxy_http_version   1.1;
          proxy_set_header Host              $$host;
          proxy_set_header X-Real-IP         $$remote_addr;
          proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;

          location /api/ {
              proxy_pass         http://points_tracker_api;
              proxy_read_timeout 30s;
          }

          location /hubs/ {
              proxy_pass         http://points_tracker_api;
              proxy_set_header   Upgrade    $$http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_read_timeout 86400s;
          }

          location / {
              proxy_pass http://points_tracker_web;
          }
      }

  postgres_init_sql:
    content: |
      CREATE EXTENSION IF NOT EXISTS "pgcrypto";

@if (!auth.isInitialized()) {
  <div class="fixed inset-0 flex items-center justify-center bg-bg">
    <pts-loading-spinner size="lg" />
  </div>
} @else {
  <div class="min-h-[100dvh] flex flex-col bg-bg text-on-surface">
    <pts-nav-bar />
    <main class="flex-1 w-full max-w-2xl md:max-w-4xl lg:max-w-6xl mx-auto px-3 sm:px-4 md:px-6 py-4 sm:py-6 pb-[env(safe-area-inset-bottom)]">
      <router-outlet />
    </main>
  </div>
  <pts-toast-container />
}

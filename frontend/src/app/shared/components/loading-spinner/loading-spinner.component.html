<div
  class="flex items-center justify-center"
  [class.fixed]="overlay()"
  [class.inset-0]="overlay()"
  [class.bg-surface/80]="overlay()"
  [class.z-50]="overlay()"
  role="status"
  aria-label="Loading"
>
  <span
    class="inline-block rounded-full border-4 border-primary/20 border-t-primary animate-spin"
    [class]="sizeClass()"
  ></span>
</div>

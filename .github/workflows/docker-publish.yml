name: Build and publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

# Each component publishes to its own image inside GHCR:
#   ghcr.io/<owner>/<repo>-api:<tag>
#   ghcr.io/<owner>/<repo>-web:<tag>
# Tags pushed: `latest` for main + the short commit SHA for traceability.
env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./backend
            image_suffix: api
          - name: web
            context: ./frontend
            image_suffix: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}-${{ matrix.image_suffix }}
          # Tag strategy:
          #   latest          → only on the default branch (pin to "latest stable")
          #   <branch>        → "main" or "feature-foo" — moves with each push
          #   <branch>-<sha>  → immutable per-commit reference, easy to roll back to
          #   sha-<short>     → keeps the original sha-only tag for direct commit lookups
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=${{ matrix.image_suffix }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
